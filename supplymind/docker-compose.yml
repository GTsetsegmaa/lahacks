version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      - agents
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  agents:
    build:
      context: .
      dockerfile: agents/Dockerfile
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434}
      - LLM_MODEL=${LLM_MODEL:-gemma3}
      - BACKEND_URL=http://backend:8000
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: supplymind
