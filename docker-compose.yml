services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ASI_ONE_API_KEY=${ASI_ONE_API_KEY:-}
      - ASI1_API_KEY=${ASI1_API_KEY:-}
      - ASI1_MODEL=${ASI1_MODEL:-asi1}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434}
      - LLM_MODEL=${LLM_MODEL:-gemma3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./shared:/app/shared:ro
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  agents:
    build:
      context: .
      dockerfile: agents/Dockerfile
    environment:
      - ASI_ONE_API_KEY=${ASI_ONE_API_KEY:-}
      - ASI1_API_KEY=${ASI1_API_KEY:-}
      - ASI1_MODEL=${ASI1_MODEL:-asi1}
      - AGENTVERSE_KEY=${AGENTVERSE_KEY:-}
      - AGENT_SEED_PHRASE=${AGENT_SEED_PHRASE:-coordinator_seed_supplymind_2024}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434}
      - LLM_MODEL=${LLM_MODEL:-gemma3}
      - BACKEND_URL=http://backend:8000
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: supplymind
